<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#ECEEF1" />
<title>Weight Log</title>
<style>
  :root{
    --bg:#ECEEF1;--panel:#FFFFFF;--ink:#14161A;--sub:#6A7079;--line:#DDE1E6;
    --faint:#F2F4F6;--accent:#2D5BFF;--accentSoft:#E7ECFF;--good:#1E9E6A;
    --warn:#F0521B;--warnSoft:#FDECE4;--carb:#9B6BFF;
    --mono:ui-monospace,'SF Mono','JetBrains Mono','Roboto Mono',Menlo,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));
    -webkit-tap-highlight-color:transparent}
  .wrap{max-width:820px;margin:0 auto}
  h1{margin:2px 0 0;font-size:26px;font-weight:800;letter-spacing:-.5px}
  h2{margin:0 0 8px;font-size:22px;font-weight:800;text-align:center}
  .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:700}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .col{display:flex;flex-direction:column;gap:12px}
  .row{display:flex;align-items:center;justify-content:space-between}
  .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:12px}
  .statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
  .tabs{display:flex;gap:4px;background:var(--panel);padding:4px;border-radius:12px;border:1px solid var(--line);margin-bottom:16px}
  .tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 8px;border:none;background:transparent;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--sub);cursor:pointer;font-family:var(--sans)}
  .tab.active{background:var(--accentSoft);color:var(--accent)}
  .tab:hover{color:var(--ink)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .dow{text-align:center;font-size:11px;color:var(--sub);font-weight:600}
  .day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:1px solid var(--line);border-radius:9px;background:var(--panel);padding:2px;cursor:pointer;font-family:var(--sans)}
  .day:not(:disabled):hover{border-color:var(--accent)}
  .day:disabled{opacity:.35;cursor:default}
  .day .dnum{font-size:11px;color:var(--sub);font-weight:500}
  .day.today .dnum{color:var(--accent);font-weight:800}
  .day.has{background:var(--accentSoft);border-color:var(--accentSoft)}
  .day.sel{box-shadow:0 0 0 2px var(--accent);border-color:var(--accent)}
  .day .dval{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--ink)}
  .dark{background:var(--ink)!important;color:#fff;border-color:var(--ink)!important}
  .dark .eyebrow{color:#8FA0FF}
  .readout{font-family:var(--mono);font-weight:800;letter-spacing:-1px}
  input,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:var(--sans);color:var(--ink);background:var(--panel);outline:none}
  input:focus,select:focus{border-color:var(--accent)}
  .flabel{font-size:12px;color:var(--sub);font-weight:600;margin-bottom:5px;display:block}
  .btn{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);white-space:nowrap}
  .ghost{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;background:transparent;border:1px solid var(--line);border-radius:9px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;font-family:var(--sans)}
  .ghost:hover{border-color:var(--accent);color:var(--accent)}
  .iconbtn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;padding:0;background:transparent;border:1px solid var(--line);border-radius:9px;color:var(--ink);cursor:pointer;font-size:18px;line-height:1}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;padding:9px 8px;border:1px solid var(--line);background:var(--panel);border-radius:9px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;font-family:var(--sans)}
  .seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .ranges{display:flex;gap:4px}
  .ranges button{padding:5px 11px;border:1px solid var(--line);background:var(--panel);border-radius:8px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;font-family:var(--mono)}
  .ranges button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .stat .slabel{font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .stat .sval{font-family:var(--mono);font-size:24px;font-weight:800;margin-top:4px}
  .legend{display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--sub);flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .lk{width:14px;height:0;border-top:2px solid}
  ul.tips{margin:0;padding-left:18px;font-size:13.5px;line-height:1.65}
  ul.tips li{margin-bottom:6px}
  .macrorow{display:flex;align-items:center;gap:10px}
  .swatch{width:10px;height:10px;border-radius:3px}
  .empty{text-align:center;color:var(--sub);padding:40px 20px}
  .note{font-size:11px;color:var(--sub);margin-top:22px;line-height:1.5}
  .syncbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);padding:4px 8px;border:1px solid var(--line);border-radius:20px}
  .syncbadge.ok .dot{background:var(--good)}
  .syncbadge.err .dot{background:var(--warn)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--sub)}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .overlay{position:fixed;inset:0;background:rgba(20,22,26,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50}
  .modal{width:100%;max-width:440px;max-height:85vh;overflow-y:auto}
  .login-wrap{display:flex;align-items:center;justify-content:center;min-height:460px;padding:20px 0}
  .login-box{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:40px 32px;max-width:380px;width:100%;display:flex;flex-direction:column;align-items:center}
  .login-icon{font-size:52px;margin-bottom:16px;line-height:1}
  .login-box p{color:var(--sub);font-size:14px;text-align:center;margin:0 0 24px;line-height:1.5}
  .googlebtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;background:var(--panel);border:1px solid var(--line);border-radius:12px;font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;font-family:var(--sans)}
  .googlebtn:hover{border-color:var(--accent)}
  .errbanner{background:var(--warnSoft);border:1px solid var(--warn);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--ink);margin-top:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .errbanner button{padding:3px 8px;font-size:12px;background:transparent;border:1px solid var(--warn);border-radius:6px;cursor:pointer;color:var(--warn)}
  .spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .setup-code{background:var(--faint);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-family:var(--mono);font-size:11.5px;color:var(--ink);white-space:pre-wrap;word-break:break-all;margin:10px 0 0}
  @media(max-width:640px){.grid2{grid-template-columns:1fr}.statgrid{grid-template-columns:repeat(2,1fr)}}
  @media(prefers-reduced-motion:reduce){*,.spinner{animation:none!important;transition:none!important}}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
</style>
</head>

<!-- Firebase SDK (loaded from Google CDN — requires internet on first load) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<div class="wrap">
  <div id="root"></div>
  <p class="note" id="footnote" style="display:none">
    Calorie and macro figures are general estimates from the Mifflin–St Jeor equation and standard training guidelines —
    a starting point to adjust based on real results, not medical advice.
    Your data is stored in Firebase Realtime Database and is only accessible with your Google account.
  </p>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   WEIGHT LOG — Firebase synced edition
   ───────────────────────────────────────────────────────────────────────────
   SETUP (one-time, ~10 minutes):

   1. Go to console.firebase.google.com → New project → name it → Continue
   2. Left sidebar: Build → Authentication → Get started → Google → Enable → Save
   3. Left sidebar: Build → Realtime Database → Create database → Start in test mode
   4. In Realtime Database → Rules tab, paste this and Publish:
        {
          "rules": {
            "users": {
              "$uid": {
                ".read":  "auth != null && auth.uid == $uid",
                ".write": "auth != null && auth.uid == $uid"
              }
            }
          }
        }
   5. Project Overview (home icon) → Add app → Web (</>)
      → Register app → copy the firebaseConfig object → paste below
   6. Rename this file to index.html → push to a GitHub repo
   7. GitHub repo Settings → Pages → Source: Deploy from branch → main / root → Save
   8. Firebase console → Authentication → Settings → Authorized domains → Add domain
      → add your GitHub Pages URL (e.g. yourname.github.io)
   ═══════════════════════════════════════════════════════════════════════════ */

var FIREBASE_CONFIG = {
    apiKey: "AIzaSyCoc0xQtac4GqOCu2ychjS8G7Gt9_utb_8",
    authDomain: "sc3les-dde20.firebaseapp.com",
    databaseURL: "https://sc3les-dde20-default-rtdb.firebaseio.com",
    projectId: "sc3les-dde20",
    storageBucket: "sc3les-dde20.firebasestorage.app",
    messagingSenderId: "210156384182",
    appId: "1:210156384182:web:6eaa7eeb934d8ce36d5b17"
};
// ─────────────────────────────────────────────────────────────────────────────

var CONFIGURED = FIREBASE_CONFIG.apiKey !== "REPLACE_ME";

/* ═══════════════════════ defaults ══════════════════════════════════════════ */
var DEFAULT_PROFILE = {sex:"male",age:18,heightIn:70,activity:"high",phase:"bulk",goalWeight:165,unit:"lb"};

/* ═══════════════════════ app state ═════════════════════════════════════════ */
var S = {
  user:null, loading:true, syncOk:false, syncErr:null,
  tab:"log", entries:{}, profile:Object.assign({},DEFAULT_PROFILE),
  cursor:(function(){var d=new Date();return{y:d.getFullYear(),m:d.getMonth()};}()),
  selectedDay:null, range:7, settingsOpen:false, confirmReset:false
};

/* ═══════════════════════ Firebase & auth ═══════════════════════════════════ */
var _db=null, _auth=null, _lref=null, _lfn=null, _ptimer=null;

function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    _auth=firebase.auth();
    _db=firebase.database();
    _auth.onAuthStateChanged(onAuthChange);
  }catch(e){
    S.loading=false; S.syncErr=e.message; render();
  }
}

function onAuthChange(user){
  // tear down old listener
  if(_lref&&_lfn){_lref.off("value",_lfn);_lref=null;_lfn=null;}
  if(user){
    S.user=user; S.loading=true; render();
    var ref=_db.ref("users/"+user.uid);
    _lfn=function(snap){
      var data=snap.val()||{};
      var ne=data.entries||{};
      var np=Object.assign({},DEFAULT_PROFILE,data.profile||{});
      var changed=S.loading||
        JSON.stringify(ne)!==JSON.stringify(S.entries)||
        JSON.stringify(np)!==JSON.stringify(S.profile);
      S.entries=ne; S.profile=np; S.loading=false; S.syncOk=true;
      if(changed)render();
    };
    _lref=ref;
    ref.on("value",_lfn,function(e){S.syncErr=e.message;S.loading=false;render();});
  }else{
    S.user=null; S.loading=false; S.syncOk=false;
    S.entries={}; S.profile=Object.assign({},DEFAULT_PROFILE);
    render();
  }
}

function signIn(){
  if(!_auth)return;
  S.syncErr=null;
  _auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(function(e){S.syncErr=e.message;render();});
}
function signOut(){
  if(!_auth)return;
  _auth.signOut().then(function(){S.settingsOpen=false;S.confirmReset=false;});
}

function persist(){
  if(!S.user||!_db)return;
  clearTimeout(_ptimer);
  _ptimer=setTimeout(function(){
    _db.ref("users/"+S.user.uid).set({entries:S.entries,profile:S.profile})
      .then(function(){S.syncOk=true;})
      .catch(function(e){S.syncErr=e.message;render();});
  },600);
}

/* ═══════════════════════ date helpers ══════════════════════════════════════ */
function pad(n){return(""+n).padStart(2,"0");}
function keyOf(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function todayKey(){return keyOf(new Date());}
function parseKey(k){var p=k.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function niceDate(k){return parseKey(k).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});}
var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
var DOW=["Su","Mo","Tu","We","Th","Fr","Sa"];

/* ═══════════════════════ nutrition ═════════════════════════════════════════ */
var ACTIVITY={
  sedentary:{label:"Sedentary — desk job, little exercise",mult:1.2},
  light:    {label:"Light — 1–3 sessions/week",mult:1.375},
  moderate: {label:"Moderate — 3–5 sessions/week",mult:1.55},
  high:     {label:"Very active — 6–7 sessions/week",mult:1.725},
  athlete:  {label:"Athlete — hard training 2x/day",mult:1.9}
};
var PHASE_TIPS={
  bulk:{title:"Dialing in a clean bulk",tips:[
    "Aim for 0.25–0.5 lb of gain per week. Faster than that is mostly fat.",
    "Hit your protein target every day — it's the biggest lever for turning a surplus into muscle.",
    "Drive progressive overload: add reps or weight over time. The surplus only pays off if training pushes adaptation.",
    "Get most carbs around your workouts to fuel hard sessions and recovery.",
    "If the scale climbs faster than ~0.5 lb/week for two straight weeks, trim the surplus by ~150 kcal.",
    "Sleep 7–9 hours. Muscle is built during recovery, not in the gym."]},
  cut:{title:"Cutting without losing muscle",tips:[
    "Target about 0.5–1% of bodyweight lost per week. Slower preserves more muscle.",
    "Keep protein high (≈1.1 g/lb) — it protects muscle and keeps you full in a deficit.",
    "Keep lifting heavy. Dropping training intensity is the fastest way to lose hard-won muscle.",
    "Lean on high-volume, high-fiber foods (vegetables, lean protein) to stay full on fewer calories.",
    "Expect the scale to stall for days at a time — judge progress by the weekly average, not daily noise.",
    "If weight hasn't moved in ~2 weeks, drop another ~150–200 kcal or add a bit of cardio."]},
  maintain:{title:"Holding steady",tips:[
    "Keep weight within a ~2–3 lb band around your goal — small fluctuations are normal.",
    "Maintenance is a great time to push strength PRs without a surplus or deficit.",
    "Keep protein steady to retain muscle while you're not actively bulking.",
    "Use this phase to lock in good habits before your next bulk or cut."]}
};
function mifflinBMR(p,w){
  var b=10*(w/2.20462)+6.25*(+p.heightIn*2.54)-5*(+p.age);
  return Math.round(p.sex==="male"?b+5:b-161);
}
function buildPlan(p,w){
  var bmr=mifflinBMR(p,w),tdee=Math.round(bmr*ACTIVITY[p.activity].mult);
  var target=tdee,delta="at maintenance";
  if(p.phase==="bulk"){target=tdee+350;delta="+350 kcal lean surplus";}
  else if(p.phase==="cut"){target=tdee-500;delta="−500 kcal deficit";}
  var protein=Math.round((p.phase==="cut"?1.1:1.0)*w),fat=Math.round(0.35*w);
  var pCal=protein*4,fCal=fat*9,cCal=Math.max(0,target-pCal-fCal),carbs=Math.round(cCal/4);
  return{bmr,tdee,target,delta,protein,fat,carbs,pCal,fCal,cCal,w};
}

/* ═══════════════════════ stat engine ═══════════════════════════════════════ */
function computeStats(){
  var sorted=Object.keys(S.entries).sort().map(function(k){return[k,S.entries[k]];});
  if(!sorted.length)return{sorted:[],series:[],current:null,avg7:null,weekly:null,toGoal:null,eta:null};
  var lastDate=parseKey(sorted[sorted.length-1][0]),firstDate=parseKey(sorted[0][0]);
  var start=S.range===0?firstDate:addDays(lastDate,-(S.range-1));
  var series=[];
  for(var d=new Date(start);d<=lastDate;d=addDays(d,1)){
    var k=keyOf(d);
    series.push({key:k,label:(d.getMonth()+1)+"/"+d.getDate(),weight:S.entries[k]!=null?S.entries[k]:null});
  }
  series.forEach(function(pt,i){
    var w=[];for(var j=i;j>=0&&j>i-7;j--)if(series[j].weight!=null)w.push(series[j].weight);
    pt.ma=w.length?Math.round(w.reduce(function(a,b){return a+b;},0)/w.length*10)/10:null;
  });
  var allV=sorted.map(function(e){return e[1];});
  var current=allV[allV.length-1];
  var last7=allV.slice(-7),avg7=last7.reduce(function(a,b){return a+b;},0)/last7.length;
  var prev7=allV.slice(-14,-7);
  var prevAvg=prev7.length?prev7.reduce(function(a,b){return a+b;},0)/prev7.length:null;
  var weekly=null;
  if(prevAvg!=null)weekly=avg7-prevAvg;
  else if(sorted.length>=2){var days=(lastDate-firstDate)/86400000;if(days>0)weekly=(current-allV[0])/days*7;}
  var toGoal=S.profile.goalWeight-current;
  var eta=null;
  if(weekly!=null&&Math.abs(weekly)>0.05&&Math.sign(weekly)===Math.sign(toGoal)&&toGoal!==0){
    var wks=Math.abs(toGoal/weekly);
    if(wks<200)eta=wks<1.5?"under 2 weeks":wks<8?("about "+Math.round(wks)+" weeks"):("about "+Math.round(wks/4.345)+" months");
  }
  return{sorted,series,current,avg7,weekly,toGoal,eta};
}

/* ═══════════════════════ SVG helpers ═══════════════════════════════════════ */
function esc(s){return(""+s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");}
function chartSVG(series,goal,unit){
  var W=600,H=240,L=44,R=14,T=12,B=24,iw=W-L-R,ih=H-T-B;
  var vp=[],mp=[];
  series.forEach(function(p,i){
    if(p.weight!=null)vp.push({i:i,v:p.weight,l:p.label});
    if(p.ma!=null)mp.push({i:i,v:p.ma});
  });
  if(!vp.length)return'<div class="empty">No data in this range yet.</div>';
  var nums=vp.map(function(p){return p.v;}).concat([goal]);
  var lo=Math.min.apply(null,nums),hi=Math.max.apply(null,nums),span=(hi-lo)||1;
  lo-=span*0.12;hi+=span*0.12;
  var n=series.length;
  function X(i){return L+(n<=1?iw/2:(i/(n-1))*iw);}
  function Y(v){return T+ih-((v-lo)/(hi-lo))*ih;}
  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="240" style="overflow:visible">';
  for(var t=0;t<=4;t++){var gv=lo+(hi-lo)*t/4,gy=Y(gv);
    svg+='<line x1="'+L+'" y1="'+gy+'" x2="'+(W-R)+'" y2="'+gy+'" stroke="#F2F4F6"/>';
    svg+='<text x="'+(L-6)+'" y="'+(gy+4)+'" text-anchor="end" font-size="11" fill="#6A7079" font-family="monospace">'+gv.toFixed(0)+'</text>';}
  var gy2=Y(goal);
  svg+='<line x1="'+L+'" y1="'+gy2+'" x2="'+(W-R)+'" y2="'+gy2+'" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="5 4"/>';
  svg+='<text x="'+(W-R-2)+'" y="'+(gy2-5)+'" text-anchor="end" font-size="10" fill="#1E9E6A">goal '+goal+'</text>';
  if(mp.length>1)svg+='<path d="M'+mp.map(function(p){return X(p.i)+" "+Y(p.v);}).join("L")+'" fill="none" stroke="#2D5BFF" stroke-width="1.5" stroke-dasharray="4 3"/>';
  if(vp.length>1)svg+='<path d="M'+vp.map(function(p){return X(p.i)+" "+Y(p.v);}).join("L")+'" fill="none" stroke="#14161A" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>';
  vp.forEach(function(p){svg+='<circle cx="'+X(p.i)+'" cy="'+Y(p.v)+'" r="3" fill="#2D5BFF"><title>'+p.l+': '+p.v+' '+esc(unit)+'</title></circle>';});
  var step=Math.max(1,Math.ceil(n/6));
  for(var xi=0;xi<n;xi+=step)svg+='<text x="'+X(xi)+'" y="'+(H-4)+'" text-anchor="middle" font-size="11" fill="#6A7079">'+esc(series[xi].label)+'</text>';
  return svg+'</svg>';
}
function donutSVG(macros,total){
  var cx=75,cy=75,r=55,C=2*Math.PI*r,off=0;
  var s='<svg viewBox="0 0 150 150" width="150" height="150"><g transform="rotate(-90 '+cx+' '+cy+')">';
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#F2F4F6" stroke-width="20"/>';
  macros.forEach(function(m){
    var dash=(total>0?m.cal/total:0)*C;
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+m.color+'" stroke-width="20" stroke-dasharray="'+dash+' '+(C-dash)+'" stroke-dashoffset="'+(-off)+'"><title>'+m.name+': '+m.grams+'g</title></circle>';
    off+=dash;
  });
  return s+'</g></svg>';
}

/* ═══════════════════════ render ════════════════════════════════════════════ */
function render(){
  var root=document.getElementById("root");
  var note=document.getElementById("footnote");
  if(!root)return;
  if(note)note.style.display="none";
  if(!CONFIGURED){root.innerHTML=renderSetup();return;}
  if(S.loading){root.innerHTML=renderLoading();return;}
  if(!S.user){root.innerHTML=renderLogin();return;}
  if(note)note.style.display="block";
  var stats=computeStats();
  var cw=stats.current!=null?stats.current:S.profile.goalWeight;
  var plan=buildPlan(S.profile,cw);
  var phase=S.profile.phase==="bulk"?"Bulk phase":S.profile.phase==="cut"?"Cut phase":"Maintenance";
  var init=S.user.displayName?S.user.displayName[0].toUpperCase():"?";
  var html=
    '<div class="header"><div><div class="eyebrow">'+esc(phase)+'</div><h1>Weight Log</h1></div>'+
    '<div style="display:flex;align-items:center;gap:8px">'+
    '<div class="syncbadge '+(S.syncOk?"ok":"")+'"><span class="dot"></span>'+(S.syncOk?"Synced":"–")+'</div>'+
    '<div class="avatar" title="'+esc(S.user.displayName||"")+'">'+esc(init)+'</div>'+
    '<button class="ghost" data-a="openSettings">⚙ Settings</button></div></div>'+
    '<div class="tabs">'+tb("log","📅 Log")+tb("trends","📈 Trends")+tb("plan","🎯 Plan")+'</div>';
  if(S.tab==="log")html+=renderLog();
  if(S.tab==="trends")html+=renderTrends(stats);
  if(S.tab==="plan")html+=renderPlan(plan,stats);
  if(S.settingsOpen)html+=renderSettings();
  if(S.syncErr)html+='<div class="errbanner">⚠ '+esc(S.syncErr)+'<button data-a="clearErr">✕</button></div>';
  root.innerHTML=html;
  var di=document.getElementById("dayInput");if(di)di.focus();
}
function tb(id,label){return'<button class="tab'+(S.tab===id?" active":"")+'" data-a="tab" data-tab="'+id+'">'+label+'</button>';}

function renderSetup(){
  return'<div class="login-wrap"><div class="login-box">'+
    '<div class="login-icon">⚖️</div><h2>Setup required</h2>'+
    '<p>Open this file in a text editor and paste your Firebase config where it says REPLACE_ME. See the instructions at the top of the &lt;script&gt; block.</p>'+
    '<div class="setup-code">apiKey: "REPLACE_ME"\nauthDomain: "REPLACE_ME.firebaseapp.com"\n...</div>'+
    '</div></div>';
}
function renderLoading(){
  return'<div class="login-wrap"><div class="login-box">'+
    '<div class="spinner"></div><p style="color:var(--sub);margin:0">Loading your data…</p></div></div>';
}
function renderLogin(){
  var googleLogo='<svg width="18" height="18" viewBox="0 0 48 48">'+
    '<path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>'+
    '<path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>'+
    '<path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>'+
    '<path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>';
  return'<div class="login-wrap"><div class="login-box">'+
    '<div class="login-icon">⚖️</div><h2>Weight Log</h2>'+
    '<p>Track your weight, trend your progress,<br>sync across every device.</p>'+
    (S.syncErr?'<div class="errbanner" style="margin-bottom:12px;width:100%">'+esc(S.syncErr)+'</div>':'')+
    '<button class="googlebtn" data-a="signIn">'+googleLogo+' Sign in with Google</button>'+
    '</div></div>';
}

function renderLog(){
  var y=S.cursor.y,m=S.cursor.m;
  var firstDow=new Date(y,m,1).getDay(),daysIn=new Date(y,m+1,0).getDate(),tk=todayKey();
  var endToday=new Date();endToday.setHours(23,59,59,999);
  var cells="";
  for(var i=0;i<firstDow;i++)cells+='<div></div>';
  for(var dd=1;dd<=daysIn;dd++){
    var date=new Date(y,m,dd),dk=keyOf(date),val=S.entries[dk];
    var future=date>endToday;
    var cls="day"+(dk===tk?" today":"")+(val!=null?" has":"")+(dk===S.selectedDay?" sel":"");
    cells+='<button class="'+cls+'"'+(future?" disabled":" data-a=\"day\" data-day=\""+dk+"\"")+'><span class="dnum">'+dd+"</span>"+(val!=null?'<span class="dval">'+val+'</span>':'')+'</button>';
  }
  var dows=DOW.map(function(d){return'<div class="dow">'+d+'</div>';}).join("");
  var sorted=Object.keys(S.entries).sort().map(function(k){return[k,S.entries[k]];});
  var latest=sorted.length?sorted[sorted.length-1]:null;
  var cal='<div class="card">'+
    '<div class="row" style="margin-bottom:12px">'+
    '<button class="iconbtn" data-a="prevMonth">‹</button>'+
    '<div style="font-weight:700;font-size:16px">'+MONTHS[m]+' '+y+'</div>'+
    '<button class="iconbtn" data-a="nextMonth">›</button></div>'+
    '<div class="cal-grid" style="margin-bottom:4px">'+dows+'</div>'+
    '<div class="cal-grid">'+cells+'</div></div>';
  var readout='<div class="card dark"><div class="eyebrow">Latest</div>'+
    '<div style="display:flex;align-items:baseline;gap:6px;margin-top:4px">'+
    '<span class="readout" style="font-size:44px">'+(latest?(+latest[1]).toFixed(1):"—")+'</span>'+
    '<span style="font-size:16px;color:#AEB6C7">'+S.profile.unit+'</span></div>'+
    '<div style="font-size:12px;color:#AEB6C7;margin-top:2px">'+(latest?niceDate(latest[0]):"No entries yet — tap a day to log.")+'</div></div>';
  var panel;
  if(S.selectedDay){
    var cur=S.entries[S.selectedDay];
    panel='<div class="card"><div style="font-weight:700">'+niceDate(S.selectedDay)+'</div>'+
      '<div style="font-size:12px;color:var(--sub);margin:2px 0 10px">Enter your weight ('+S.profile.unit+')</div>'+
      '<div style="display:flex;gap:8px"><input id="dayInput" type="number" inputmode="decimal" step="0.1" placeholder="0.0" value="'+(cur!=null?cur:"")+'" />'+
      '<button class="btn" data-a="saveDay">Save</button></div>'+
      (cur!=null?'<button class="ghost" style="margin-top:10px;color:var(--warn)" data-a="clearDay">🗑 Clear this day</button>':'')+
      '</div>';
  }else{
    panel='<div class="card" style="color:var(--sub);font-size:13px;line-height:1.5">✏️ Tap any past or current day to log or edit your weight. Logged days turn blue.</div>';
  }
  return'<div class="grid2">'+cal+'<div class="col">'+readout+panel+'</div></div>';
}

function renderTrends(stats){
  var p=S.profile;
  if(!stats.sorted.length)return'<div class="card empty">Log a few days on the <strong>Log</strong> tab and your trend will appear here.</div>';
  function stat(label,val,unit,color){
    return'<div class="card stat"><div class="slabel">'+label+'</div>'+
      '<div style="display:flex;align-items:baseline;gap:4px;margin-top:4px">'+
      '<span class="sval"'+(color?' style="color:'+color+'"':'')+'>'+val+'</span>'+
      (val!=="—"&&unit?'<span style="font-size:12px;color:var(--sub)">'+esc(unit)+'</span>':'')+
      '</div></div>';
  }
  var wk=stats.weekly;
  var html='<div class="statgrid">'+
    stat("Current",stats.current!=null?stats.current.toFixed(1):"—",p.unit)+
    stat("7-day avg",stats.avg7!=null?stats.avg7.toFixed(1):"—",p.unit)+
    stat("Weekly Δ",wk!=null?((wk>0?"+":"")+wk.toFixed(1)):"—",p.unit,wk==null?null:wk>0?"#1E9E6A":"#F0521B")+
    stat("To goal",stats.toGoal!=null?((stats.toGoal>0?"+":"")+stats.toGoal.toFixed(1)):"—",p.unit,"#2D5BFF")+
    '</div>';
  var rangebts=[[7,"7d"],[30,"30d"],[90,"90d"],[0,"All"]].map(function(r){
    return'<button class="'+(S.range===r[0]?"on":"")+'" data-a="range" data-range="'+r[0]+'">'+r[1]+'</button>';
  }).join("");
  html+='<div class="card">'+
    '<div class="row" style="margin-bottom:10px;flex-wrap:wrap;gap:8px">'+
    '<div style="font-weight:700">Trend</div><div class="ranges">'+rangebts+'</div></div>'+
    chartSVG(stats.series,p.goalWeight,p.unit)+
    '<div class="legend">'+
    '<span><span class="lk" style="border-color:#14161A"></span>Daily weight</span>'+
    '<span><span class="lk" style="border-color:#2D5BFF;border-top-style:dashed"></span>7-day avg</span>'+
    '<span><span class="lk" style="border-color:#1E9E6A;border-top-style:dashed"></span>Goal</span>'+
    '</div></div>';
  if(stats.eta)html+=
    '<div class="card" style="background:var(--accentSoft);border-color:var(--accentSoft);font-size:13px">'+
    'At your current pace of <strong>'+Math.abs(stats.weekly).toFixed(1)+' '+esc(p.unit)+'/week</strong>, '+
    'you\'re about <strong>'+stats.eta+'</strong> from your '+p.goalWeight+' '+esc(p.unit)+' goal.</div>';
  return html;
}

function renderPlan(plan,stats){
  var p=S.profile,hasData=stats.current!=null;
  var macros=[{name:"Protein",grams:plan.protein,cal:plan.pCal,color:"#1E9E6A"},
              {name:"Carbs",  grams:plan.carbs,  cal:plan.cCal,color:"#9B6BFF"},
              {name:"Fat",    grams:plan.fat,    cal:plan.fCal,color:"#F0521B"}];
  var pbs=[["bulk","Bulk"],["cut","Cut"],["maintain","Maintain"]].map(function(x){
    return'<button class="'+(p.phase===x[0]?"on":"")+'" data-a="phase" data-phase="'+x[0]+'">'+x[1]+'</button>';}).join("");
  return'<div class="col">'+
    '<div class="card"><div style="font-weight:700;margin-bottom:4px">Goal &amp; phase</div>'+
    '<div style="font-size:12px;color:var(--sub);margin-bottom:12px;line-height:1.5">The usual sequence: a controlled <strong>bulk</strong> to add muscle, then a <strong>cut</strong> to reveal it. Switch phases and all targets below update.</div>'+
    '<div class="seg" style="margin-bottom:14px">'+pbs+'</div>'+
    '<div class="grid2">'+
    '<label><span class="flabel">Goal weight ('+esc(p.unit)+')</span><input type="number" step="0.5" id="goalInput" value="'+p.goalWeight+'" /></label>'+
    '<label><span class="flabel">Current weight</span>'+
    '<div style="padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-family:var(--mono);background:var(--faint);color:'+(hasData?"var(--ink)":"var(--sub)")+'">'+
    (hasData?stats.current.toFixed(1)+" "+esc(p.unit):"log a day first")+
    '</div></label></div></div>'+

    '<div class="card dark"><div style="display:flex;align-items:center;gap:8px"><span style="color:#8FA0FF">🔥</span><div class="eyebrow">Daily target</div></div>'+
    '<div style="display:flex;align-items:baseline;gap:8px;margin-top:6px"><span class="readout" style="font-size:40px">'+plan.target.toLocaleString()+'</span><span style="font-size:15px;color:#AEB6C7">kcal</span></div>'+
    '<div style="font-size:12.5px;color:#AEB6C7;margin-top:2px">'+plan.delta+'</div>'+
    '<div style="display:flex;gap:18px;margin-top:14px">'+
    mini("BMR",plan.bmr.toLocaleString())+mini("Maintenance (TDEE)",plan.tdee.toLocaleString())+
    '</div></div>'+

    '<div class="card"><div style="font-weight:700;margin-bottom:4px">Daily macros</div>'+
    '<div style="font-size:12px;color:var(--sub);margin-bottom:8px">Built around '+(plan.protein/plan.w).toFixed(1)+' g protein per '+esc(p.unit)+' of bodyweight.</div>'+
    '<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">'+
    '<div>'+donutSVG(macros,plan.target)+'</div>'+
    '<div style="flex:1;min-width:180px;display:flex;flex-direction:column;gap:8px">'+
    macros.map(function(m){return'<div class="macrorow"><span class="swatch" style="background:'+m.color+'"></span>'+
      '<span style="flex:1;font-size:13px;font-weight:600">'+m.name+'</span>'+
      '<span style="font-family:var(--mono);font-size:14px;font-weight:700">'+m.grams+'g</span>'+
      '<span style="font-size:11px;color:var(--sub);width:56px;text-align:right">'+Math.round(m.cal/plan.target*100)+'% kcal</span></div>';}).join("")+
    '</div></div></div>'+

    '<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
    '<span style="color:var(--accent)">🏋️</span><div style="font-weight:700">'+PHASE_TIPS[p.phase].title+'</div></div>'+
    '<ul class="tips">'+PHASE_TIPS[p.phase].tips.map(function(t){return'<li>'+t+'</li>';}).join("")+'</ul></div>'+
    '</div>';
}
function mini(label,val){return'<div><div style="font-size:10.5px;color:#AEB6C7;text-transform:uppercase;letter-spacing:.5px">'+label+'</div><div style="font-family:var(--mono);font-size:16px;font-weight:700;margin-top:1px">'+val+'</div></div>';}

function renderSettings(){
  var p=S.profile;
  function opt(v,l,sel){return'<option value="'+v+'"'+(sel===v?" selected":"")+'>'+l+'</option>';}
  var actOpts=Object.keys(ACTIVITY).map(function(k){return opt(k,ACTIVITY[k].label,p.activity);}).join("");
  var name=S.user.displayName||S.user.email||"";
  var init=name?name[0].toUpperCase():"?";
  var resetBlock=S.confirmReset
    ?'<div style="display:flex;gap:8px;align-items:center"><span style="font-size:13px;color:var(--warn)">Delete everything?</span><button class="btn" style="background:var(--warn)" data-a="doReset">Yes, clear</button><button class="ghost" data-a="cancelReset">Cancel</button></div>'
    :'<button class="ghost" style="color:var(--warn)" data-a="askReset">🗑 Clear all logged weights</button>';
return'<div class="overlay" onclick="if(event.target===this){S.settingsOpen=false;S.confirmReset=false;render();}"><div class="card modal">'+
    '<div class="row" style="margin-bottom:14px"><div style="font-weight:800;font-size:18px">Your details</div><button class="iconbtn" data-a="closeSettings">✕</button></div>'+
    '<div class="col">'+
    '<div style="padding:10px 12px;background:var(--faint);border-radius:10px;font-size:13px;color:var(--sub);display:flex;align-items:center;gap:8px">'+
    '<div class="avatar" style="width:28px;height:28px;font-size:12px">'+esc(init)+'</div>'+esc(name)+
    '<button class="ghost" data-a="signOut" style="margin-left:auto;padding:5px 10px;font-size:12px">Sign out</button></div>'+
    '<label><span class="flabel">Sex (for BMR formula)</span>'+
    '<select id="setSex">'+opt("male","Male",p.sex)+opt("female","Female",p.sex)+'</select></label>'+
    '<div class="grid2">'+
    '<label><span class="flabel">Age</span><input id="setAge" type="number" value="'+p.age+'" /></label>'+
    '<label><span class="flabel">Height (inches)</span><input id="setHt" type="number" value="'+p.heightIn+'" /></label>'+
    '</div>'+
    '<label><span class="flabel">Activity level</span><select id="setAct">'+actOpts+'</select></label>'+
    '<label><span class="flabel">Weight unit</span><select id="setUnit">'+opt("lb","Pounds (lb)",p.unit)+opt("kg","Kilograms (kg)",p.unit)+'</select></label>'+
    '<button class="btn" data-a="saveSettings">Save details</button>'+
    '<div style="border-top:1px solid var(--line);padding-top:12px;display:flex;flex-direction:column;gap:10px">'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
    '<button class="ghost" data-a="exportData">⬇ Export backup</button>'+
    '<button class="ghost" data-a="importData">⬆ Import backup</button></div>'+
    resetBlock+'</div></div></div></div>';
}

/* ═══════════════════════ event handling ════════════════════════════════════ */
document.addEventListener("click",function(e){
  var el=e.target.closest("[data-a]");if(!el)return;
  var a=el.getAttribute("data-a");
  switch(a){
    case"tab":       S.tab=el.getAttribute("data-tab");S.selectedDay=null;render();break;
    case"prevMonth": S.cursor.m--;if(S.cursor.m<0){S.cursor.m=11;S.cursor.y--;}render();break;
    case"nextMonth": S.cursor.m++;if(S.cursor.m>11){S.cursor.m=0;S.cursor.y++;}render();break;
    case"day":       S.selectedDay=el.getAttribute("data-day");render();break;
    case"saveDay":{
      var v=document.getElementById("dayInput").value;
      if(v===""||isNaN(+v)||+v<=0)delete S.entries[S.selectedDay];
      else S.entries[S.selectedDay]=Math.round(+v*10)/10;
      persist();S.selectedDay=null;render();break;}
    case"clearDay":  delete S.entries[S.selectedDay];persist();S.selectedDay=null;render();break;
    case"phase":     S.profile.phase=el.getAttribute("data-phase");persist();render();break;
    case"range":     S.range=+el.getAttribute("data-range");render();break;
    case"openSettings":  S.settingsOpen=true;render();break;
    case"closeSettings": S.settingsOpen=false;S.confirmReset=false;render();break;
    case"saveSettings":{
      S.profile.sex=document.getElementById("setSex").value;
      S.profile.age=+document.getElementById("setAge").value||S.profile.age;
      S.profile.heightIn=+document.getElementById("setHt").value||S.profile.heightIn;
      S.profile.activity=document.getElementById("setAct").value;
      S.profile.unit=document.getElementById("setUnit").value;
      var gi=document.getElementById("goalInput");if(gi)S.profile.goalWeight=+gi.value||S.profile.goalWeight;
      persist();S.settingsOpen=false;render();break;}
    case"signIn":       signIn();break;
    case"signOut":      signOut();break;
    case"askReset":     S.confirmReset=true;render();break;
    case"cancelReset":  S.confirmReset=false;render();break;
    case"doReset":      S.entries={};persist();S.confirmReset=false;S.settingsOpen=false;render();break;
    case"exportData":   exportData();break;
    case"importData":   importData();break;
    case"clearErr":     S.syncErr=null;render();break;
  }
});
document.addEventListener("change",function(e){
  if(e.target.id==="goalInput"){S.profile.goalWeight=+e.target.value||S.profile.goalWeight;persist();render();}
});
document.addEventListener("keydown",function(e){
  if(e.key!=="Enter")return;
  var di=document.getElementById("dayInput");
  if(document.activeElement===di){
    var v=di.value;
    if(v&&!isNaN(+v)&&+v>0)S.entries[S.selectedDay]=Math.round(+v*10)/10;
    else delete S.entries[S.selectedDay];
    persist();S.selectedDay=null;render();
  }
});

function exportData(){
  var blob=new Blob([JSON.stringify({entries:S.entries,profile:S.profile},null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download="weight-log-backup.json";a.click();URL.revokeObjectURL(url);
}
function importData(){
  var inp=document.createElement("input");inp.type="file";inp.accept="application/json,.json";
  inp.onchange=function(){
    var f=inp.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(){
      try{
        var data=JSON.parse(r.result);
        if(data.entries)Object.assign(S.entries,data.entries);
        if(data.profile)S.profile=Object.assign({},S.profile,data.profile);
        persist();S.settingsOpen=false;render();
      }catch(e){alert("Couldn't read that file — make sure it's a backup from this app.");}
    };
    r.readAsText(f);
  };
  inp.click();
}

/* ═══════════════════════ boot ══════════════════════════════════════════════ */
if(CONFIGURED)initFirebase();
else render();
</script>
